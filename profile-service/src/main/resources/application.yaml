server:
  port: 8081

spring:
  application:
    name: profile-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 3600000