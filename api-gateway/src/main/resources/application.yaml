server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: profile-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/profiles/**

        - id: feedback-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/feedback/**

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.gatewayflow: DEBUG